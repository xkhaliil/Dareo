<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dareo</title>
    <script>
      // GitHub Pages SPA redirect
      // When a page is not found, redirect to index.html and encode the path
      // as a query parameter so the app can restore it.
      var segmentCount = 1; // number of path segments in the repo name (/Dareo/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
