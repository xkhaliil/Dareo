<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dareo — A gamified social dare platform. Challenge your friends, earn XP, level up, and climb the leaderboard."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Dareo — Dare Your Friends</title>
    <script>
      // GitHub Pages SPA redirect restore
      // Reads the path encoded by 404.html and replaces the URL
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            });
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) +
              decoded[0] +
              (decoded[1] ? "?" + decoded[1] : "") +
              l.hash,
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
